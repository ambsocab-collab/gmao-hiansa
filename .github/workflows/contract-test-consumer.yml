name: Pact Contract Tests (Consumer)

on:
  pull_request:
    paths:
      - 'tests/contract/**'
      - 'app/api/**'
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  contract-test-consumer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Pact consumer tests
        run: npm run test:pact:consumer

      - name: Upload Pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: pacts/
          retention-days: 30

      - name: Check for breaking changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const hasBreakingChangeLabel = pullRequest.labels.some(
              label => label.name === 'breaking-change'
            );

            if (hasBreakingChangeLabel) {
              console.log('⚠️ Breaking change detected - manual review required');
            }
